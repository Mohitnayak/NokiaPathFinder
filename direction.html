<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Path Map</title>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      #map {
        height: 600px;
        width: 100%;
      }
    </style>
    <style>
      .arrow-icon {
        font-size: 40px;
        color: black; /* Customize color */
        transform-origin: center; /* Rotate around the center */
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="slider-container">
      <label for="time-slider"
        >Select Timestamp: <span id="current-index">0</span></label
      >
      <input
        style="width: 70vw"
        type="range"
        id="time-slider"
        min="0"
        value="0"
        step="1"
      />
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="direction.js"></script>
    <script>
      // Initialize the map
      const map = L.map("map", { maxZoom: 18 }).setView(
        [61.493139, 23.7782057],
        18
      );

      // Add OpenStreetMap tiles
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      // Function to process and display the path
      function displayPath(data) {
        // Array to store coordinates
        const coordinates = [];

        // Take every 10th point
        for (let i = 0; i < data.length; i += 10) {
          coordinates.push([data[i].latitude, data[i].longitude]);
        }

        // Create and add the polyline
        const polyline = L.polyline(coordinates, {
          color: "blue",
          weight: 3,
          opacity: 0.7,
        }).addTo(map);

        // Fit the map to the path bounds
        map.fitBounds(polyline.getBounds());

        // Add markers for start and end points
        L.marker(coordinates[0]).addTo(map).bindPopup("Start Point");
        L.marker(coordinates[coordinates.length - 1])
          .addTo(map)
          .bindPopup("End Point");
      }

      function displayArrow(degree, latitude, longitude, color) {
        const arrowIcon = L.divIcon({
          html: `<div class="arrow-icon" style="transform: rotate(${degree}deg);color: ${color}">⇧</div>`,
          className: "", // Remove default Leaflet styling
          iconSize: [20, 20], // Size of the icon
          iconAnchor: [10, 10], // Center of the icon
        });

        const marker = L.marker([latitude, longitude], {
          icon: arrowIcon,
        }).addTo(map);

        return marker;
      }

      // Function to display arrows for bearing and direction-chest
      let bearingArrow, directionArrow, circle;
      function updateArrows(index) {
        const point = pathData[index];
        const lat = point.latitude;
        const lng = point.longitude;
        const bearing = parseFloat(point.bearing);
        const directionChest = bearing - parseFloat(point["direction-chest"]);
        const timestamp = new Date(point.timestamp).toISOString();

        // Remove previous arrows if they exist
        if (bearingArrow) map.removeLayer(bearingArrow);
        if (directionArrow) map.removeLayer(directionArrow);
        if (circle) map.removeLayer(circle);

        // Bearing arrow (red)
        bearingArrow = displayArrow(bearing, lat, lng, "red").bindPopup(
          `Bearing: ${bearing}°<br/>Timestamp: ${timestamp}`
        );

        // Direction-chest arrow (green)
        directionArrow = displayArrow(
          directionChest,
          lat,
          lng,
          "blue"
        ).bindPopup(
          `Direction-Chest: ${directionChest}°<br/>Timestamp: ${timestamp}`
        );

        circle = L.circle([lat, lng], {
          fillColor: "#888",
          fillOpacity: 0.75,
          radius: 3,
        }).addTo(map);
      }

      // Set up the slider
      const slider = document.getElementById("time-slider");
      const currentIndexLabel = document.getElementById("current-index");
      slider.max = pathData.length - 1; // Set max to the last index
      slider.addEventListener("input", (e) => {
        const index = parseInt(e.target.value);
        currentIndexLabel.textContent = index;
        updateArrows(index);
      });

      // Initial setup
      document.addEventListener("DOMContentLoaded", () => {
        displayPath(pathData); // Draw the static path
        updateArrows(0); // Show arrows for the first point initially
        fetch("/out/path1.json")
          .then((response) => response.json())
          .then((data) => {
            L.geoJSON(data).addTo(map);
          });
        fetch("/out/path2.json")
          .then((response) => response.json())
          .then((data) => {
            L.geoJSON(data).addTo(map);
          });
      });
    </script>
  </body>
</html>
